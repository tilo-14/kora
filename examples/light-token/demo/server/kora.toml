[kora]
rate_limit = 100
# Optional: Payment address to receive payment tokens (defaults to signer address)
# payment_address = "YourPaymentAddressPubkey11111111111111111111"

# ZK compression RPC URL — required for light_token: true transfers
zk_compression_rpc_url = "https://devnet.helius-rpc.com?api-key=2a0ce09b-30d3-40c7-bcd1-d379e08db70b"

# Light Protocol lookup table for devnet
light_lut_address = "qAJZMgnQJ8G6vA3WRcjD9Jan1wtKkaCFWLWskxJrR5V"

[kora.cache]
enabled = false
default_ttl = 300
account_ttl = 60

[kora.enabled_methods]
liveness = false
estimate_transaction_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true

[validation]
max_allowed_lamports = 2500000
max_signatures = 10
price_source = "Mock"
allow_durable_transactions = false
allowed_programs = [
    "11111111111111111111111111111111",              # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",   # Token Program
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",  # Associated Token Program
    "AddressLookupTab1e1111111111111111111111111",   # Address Lookup Table Program
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",   # Memo Program
    "ComputeBudget111111111111111111111111111111",    # Compute Budget Program

    # Light Protocol programs (required for compressed token transactions)
    "cTokenmWW8bLPjZEBAUgYy3zKxQZW6VKi7bqNFEVv3m",   # Light Token Program
    "SySTEM1eSU2p4BGQfQpimFEWWSC1XDFeun3Nqzz3rT7",   # Light System Program
    "compr6CUsB5m2jS4Y3831ztGSTnDpnKJTKS95d64XVq",   # Account Compression Program
]
allowed_tokens = [
    "eDVEv9oefnM8ZSL8kqJoEQx3jpF3u93EYz3etZm8fNW", # SPL mint for light-token testing
]
allowed_spl_paid_tokens = [
    "eDVEv9oefnM8ZSL8kqJoEQx3jpF3u93EYz3etZm8fNW", # SPL mint for light-token testing
]

disallowed_accounts = [
    "hndXZGK45hCxfBYvxejAXzCfCujoqkNf7rk4sTB8pek", # Test disallowed account for lookup table
]

[validation.fee_payer_policy]
# Opt in the Light Token Program so that Kora's fee payer can be referenced as
# a writable account in its instructions (needed for rent top-ups on compressed
# account creation). Without this, Kora's writable-account guard would reject
# Light Token transactions.
allow_fee_payer_writable_in_programs = [
    "cTokenmWW8bLPjZEBAUgYy3zKxQZW6VKi7bqNFEVv3m",   # Light Token Program
    "SySTEM1eSU2p4BGQfQpimFEWWSC1XDFeun3Nqzz3rT7",   # Light System Program
]

[validation.fee_payer_policy.system]
allow_transfer = true
allow_assign = true
allow_create_account = true
allow_allocate = true

[validation.fee_payer_policy.system.nonce]
allow_initialize = true
allow_advance = true
allow_authorize = true
allow_withdraw = true

[validation.fee_payer_policy.spl_token]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[validation.fee_payer_policy.token_2022]
allow_transfer = true
allow_burn = true
allow_close_account = true
allow_approve = true
allow_revoke = true
allow_set_authority = true
allow_mint_to = true
allow_initialize_mint = true
allow_initialize_account = true
allow_initialize_multisig = true
allow_freeze_account = true
allow_thaw_account = true

[validation.price]
type = "free" # free / margin / fixed


[validation.token2022]
blocked_mint_extensions = [
    # "confidential_transfer_mint",     # Confidential transfer configuration for the mint
    # "confidential_mint_burn",         # Confidential mint and burn configuration
    # "transfer_fee_config",            # Transfer fee configuration
    # "mint_close_authority",           # Authority allowed to close the mint
    # "interest_bearing_config",        # Interest-bearing token configuration
    # "non_transferable",               # Makes tokens non-transferable
    # "permanent_delegate",             # Permanent delegate for the mint
    # "transfer_hook",                  # Block tokens with transfer hooks
    # "pausable",                       # Block pausable tokens
]
blocked_account_extensions = [
    # "confidential_transfer_account", # Confidential transfer state for the account
    # "non_transferable_account",      # Non-transferable token account
    # "transfer_hook_account",          # Transfer hook state for the account
    # "pausable_account",               # Pausable token account state
    # "memo_transfer",                  # Requires memo for transfers
    # "cpi_guard",                      # Prevents certain CPI calls
    # "immutable_owner",                # Account owner cannot be changed
    # "default_account_state",          # Default state for new accounts
]

[kora.usage_limit]
enabled = false
cache_url = "redis://redis:6379"
max_transactions = 2
fallback_if_unavailable = false
