[kora]
rate_limit = 100

[kora.cache]
enabled = false
default_ttl = 300
account_ttl = 60

[kora.enabled_methods]
liveness = false
estimate_transaction_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true

[validation]
# Caps fee payer outflow per transaction (System/SPL instructions only).
# Light Token CPI outflows (~17k lamports for ATA creation, ~766 per write)
# are not tracked by this limit — they bypass outflow validation.
max_allowed_lamports = 2500000
max_signatures = 10
price_source = "Mock"
allow_durable_transactions = false
allowed_programs = [
    "11111111111111111111111111111111",              # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",   # Token Program
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",  # Associated Token Program
    "AddressLookupTab1e1111111111111111111111111",   # Address Lookup Table Program
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",   # Memo Program
    "ComputeBudget111111111111111111111111111111",    # Compute Budget Program

    # Light Protocol programs (required for Light Token transactions)
    "cTokenmWW8bLPjZEBAUgYy3zKxQZW6VKi7bqNFEVv3m",   # Light Token Program
    "SySTEM1eSU2p4BGQfQpimFEWWSC1XDFeun3Nqzz3rT7",   # Light System Program
    "compr6CUsB5m2jS4Y3831ztGSTnDpnKJTKS95d64XVq",   # Account Compression Program
    "noopb9bkMVfRPU8AsbpTUg8AQkHtKwMYZiFUjNRtMmV",   # Noop Program (Light Protocol Merkle tree logging)
]
allowed_tokens = [
    "BV2srV4GfaMpShePXSTMAqDWPSZXfy2y5kC5uTYqCRAW", # Light Token mint (populated by devnet-setup.ts)
]
allowed_spl_paid_tokens = [
    "BV2srV4GfaMpShePXSTMAqDWPSZXfy2y5kC5uTYqCRAW", # Light Token mint (populated by devnet-setup.ts)
]

disallowed_accounts = []

[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = true             # needed for Light Token rent top-ups
allow_assign = false
allow_create_account = true    # needed for ATA creation
allow_allocate = false

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.spl_token]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = true    # needed for ATA initialization
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.token_2022]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = false
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.price]
type = "free"

[validation.token2022]
blocked_mint_extensions = []
blocked_account_extensions = []

[kora.usage_limit]
enabled = false
cache_url = "redis://redis:6379"
max_transactions = 2
fallback_if_unavailable = false
